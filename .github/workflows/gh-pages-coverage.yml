name: deploy-coverage-to-pages

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - 'docs/**'
      - 'documentation/coverage/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Build coverage site into docs/
        env:
          COVERAGE_SITE_DIR: docs
        run: |
          python tests/build_coverage_site.py

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs
          git commit -m "Update coverage site [skip ci]" || echo "No changes"
          git push origin dev
