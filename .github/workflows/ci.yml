name: CI

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - 'docs/**'
  pull_request:

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Build coverage site (PR uses documentation/coverage; push writes docs/)
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            export COVERAGE_SITE_DIR=docs
          fi
          python tests/build_coverage_site.py
          # Ensure docs directory exists for Pages and disable Jekyll processing
          if [ -d docs ]; then
            touch docs/.nojekyll
            if [ ! -f docs/index.html ]; then
              echo "<!doctype html><meta charset=\"utf-8\"><title>DATE-SMT Coverage</title><p>No coverage index generated. Check CI logs." > docs/index.html
            fi
          fi

      - name: Commit and push docs (only on dev push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs
          git commit -m "Update coverage site [skip ci]" || echo "No changes"
          git push origin dev

      - name: Upload coverage site artifact (PR)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: documentation/coverage
          if-no-files-found: error
