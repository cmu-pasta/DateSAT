name: CI

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - 'docs/**'
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            requirements/core.txt
            requirements/dev.txt
            requirements/llm_pipeline.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Restore pytest cache
        uses: actions/cache@v4
        id: pytest-cache
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('requirements/**/*.txt') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-pytest-${{ hashFiles('requirements/**/*.txt') }}-
            ${{ runner.os }}-pytest-

      - name: Build coverage site (unit tests only)
        env:
          PYTEST_WORKERS: auto
        run: |
          rm -rf public
          mkdir -p public
          COVERAGE_SITE_DIR=$(pwd)/public python tests/build_coverage_site.py

      - name: Save pytest cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .pytest_cache
          key: ${{ steps.pytest-cache.outputs.cache-primary-key }}

      - name: Upload coverage site artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: public
          if-no-files-found: error


  deploy-pages:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage site artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-site
          path: public

      - name: Prepare site
        run: |
          touch public/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
