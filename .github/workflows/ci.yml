name: CI

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - 'docs/**'
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      site-dir: ${{ steps.set-output.outputs.site_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Build coverage site (unit tests only)
        run: |
          python tests/build_coverage_site.py

      - name: Upload coverage site artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: documentation/coverage
          if-no-files-found: error

      - name: Set site_dir output
        id: set-output
        run: echo "site_dir=documentation/coverage" >> $GITHUB_OUTPUT

  deploy-pages:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage site artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-site
          path: public

      - name: Prepare site
        run: |
          touch public/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
