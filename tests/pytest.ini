# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    naive: marks tests as naive solver tests
    epoch_days: marks tests as epoch_days solver tests
    hybrid: marks tests as hybrid solver tests
    alpha_beta: marks tests as alpha-beta solver tests
    alpha_beta_table: marks tests as alpha-beta (table) solver tests
    bitvector: marks tests as bitvector implementation tests
    integer: marks tests as integer implementation tests
    integration: marks tests as integration tests
    enumeration: marks tests as enumeration baseline solver tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
