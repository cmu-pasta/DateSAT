# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    baseline: marks tests as baseline solver tests
    advanced: marks tests as advanced solver tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
