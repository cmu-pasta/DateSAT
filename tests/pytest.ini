# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    baseline: marks tests as baseline solver tests
    epoch_days: marks tests as epoch_days solver tests
    hybrid: marks tests as hybrid solver tests
    ab: marks tests as alpha-beta solver tests
    ab_new: marks tests as alpha-beta (table) solver tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
